<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>RACELOGR — Reset Password</title>
    <script>
      // Extract the full query string and pass it along to the app
      var url = "racelogr://reset-password" + window.location.search + window.location.hash;
      window.location.replace(url);
    </script>
  </head>
  <body>
    <p>Redirecting to RACELOGR...</p>
    <p>If you are not redirected, <a id="link" href="racelogr://reset-password">tap here</a>.</p>
    <script>
      document.getElementById("link").href = url;
    </script>
  </body>
</html>
